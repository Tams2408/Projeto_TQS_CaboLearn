name: Pipeline CI/CD CaboLearn

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  testes-python:
    name: Executar testes com PyTest
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Executar testes automatizados
        run: |
          python -m pytest -v

      - name: Executar testes com cobertura
        run: |
          python -m pytest --cov=. --cov-report=term-missing


  testes-docker:
    name: Testar aplicação no Docker
    runs-on: ubuntu-latest
    needs: testes-python

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Construir imagem Docker
        run: |
          docker build -f docker/Dockerfile -t cabolearn:test .

      - name: Executar testes dentro do Docker
        run: |
          docker run --rm cabolearn:test python -m pytest -v

      - name: Executar testes com cobertura dentro do Docker
        run: |
          docker run --rm cabolearn:test python -m pytest --cov=. --cov-report=term-missing