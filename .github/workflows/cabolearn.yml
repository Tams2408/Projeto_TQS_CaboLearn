name: CaboLearn CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------
  # 1) Testes Python (PyTest) — rápidos, correm isolados via Flask test client
  # ---------------------------------------------------------------------
  testes-python:
    name: Testes Unitários e de API (PyTest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Correr testes PyTest
        run: pytest tests/ -v --junitxml=resultados-pytest.xml

      - name: Publicar resultados dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-pytest
          path: resultados-pytest.xml
          retention-days: 7

  # ---------------------------------------------------------------------
  # 2) Testes end-to-end (Playwright) — correm contra a app real via Docker
  # ---------------------------------------------------------------------
  testes-e2e:
    name: Testes E2E (Playwright)
    runs-on: ubuntu-latest
    needs: testes-python

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Construir e arrancar a aplicação (Docker Compose)
        run: docker compose -f docker/docker-compose.yml up -d --build

      - name: Aguardar que a aplicação esteja pronta
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/login > /dev/null; then
              echo "Aplicação disponível."
              exit 0
            fi
            echo "A aguardar pela aplicação... ($i/30)"
            sleep 2
          done
          echo "A aplicação não respondeu a tempo."
          docker compose -f docker/docker-compose.yml logs
          exit 1

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: playwright/package-lock.json

      - name: Instalar dependências do Playwright
        working-directory: playwright
        run: npm ci

      - name: Instalar browsers do Playwright
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Correr testes Playwright
        working-directory: playwright
        run: npm test

      - name: Publicar relatório do Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-playwright
          path: playwright/playwright-report/
          retention-days: 7

      - name: Publicar logs da aplicação (em caso de falha)
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs

      - name: Parar a aplicação
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  # ---------------------------------------------------------------------
  # 3) Build da imagem Docker — confirma que a imagem final continua a construir
  # ---------------------------------------------------------------------
  build-docker:
    name: Build da Imagem Docker
    runs-on: ubuntu-latest
    needs: [ testes-python, testes-e2e ]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Build da imagem
        run: docker build -f docker/Dockerfile -t cabolearn:${{ github.sha }} .